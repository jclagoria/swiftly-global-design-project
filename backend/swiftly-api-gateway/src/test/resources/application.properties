com.swiftly.gateway.GatewayApplication=

# Stork/Eureka setup
quarkus.stork.service-discovery-eureka.server-url=http://eureka:8761/eureka
# Rest client base URLs will be resolved via Stork
quarkus.rest-client."com.swiftly.gateway.infrastructure.client.DownstreamHealthClient".url=stork://<service-name>
health.check.timeout=5S

# default per-route limit (tokens) and refill window (seconds)
rate-limit.default.limit=1000
rate-limit.default.window.seconds=3600

# Enable Micrometer?s HTTP-server and JAX-RS binders
quarkus.micrometer.binder.http-server.enabled=true
quarkus.micrometer.binder.jaxrs.enabled=true

# Expose Prometheus scrape endpoint
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/metrics

# (Optional) Tweak meter naming conventions
quarkus.micrometer.binder.http-server.routes:enabled=true
quarkus.micrometer.binder.http-server.requests:enabled=true

# Serve the gateway's own OpenAPI under /openapi
quarkus.smallrye-openapi.path=/openapi

# Don?t expose the default /q/openapi
quarkus.smallrye-openapi.ui.always-include=false

quarkus.rest-client."com.swiftly.gateway.infrastructure.client.DownstreamOpenApiClient".url=stork://${serviceName}
